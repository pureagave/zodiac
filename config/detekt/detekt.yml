style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    # Input-validation / hardware-setup code reads cleanest as a short
    # sequence of early-return guards (NMEA + coordinate parsing, USB/GPS
    # source bring-up). Default 2 is tight for that style; 3 caps it
    # without forcing arrow-nesting.
    max: 3

complexity:
  LongMethod:
    active: false
  TooManyFunctions:
    # Default 11 was tight for CockpitViewModel which exposes one method per
    # discrete cockpit operation. Bumped each time a discrete cockpit action
    # is added (concept cycling; the private sendCommand dispatch helper;
    # setNavTarget for the drive-to feature was the latest); kept just above
    # the actual count so the next addition still requires a deliberate decision.
    thresholdInClasses: 20
    # CRTVectorScreen.kt is the canonical screen — header / left / right
    # rail / center viewport / chips all live as private composables in
    # one file. 12 fits the current shape with a touch of headroom.
    thresholdInFiles: 12

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
