<!doctype html>
<html><head><meta charset="utf-8"><title>MAP 4 — MOTION TRACKER</title>
<style>
  html,body{margin:0;background:#000;color:#7eff62;font-family:"Courier New",monospace}
  #stage{width:1600px;height:900px;position:relative;
    background:repeating-linear-gradient(0deg,#000 0 2px,#0a1a08 2px 3px),
               radial-gradient(ellipse at center,#0a1a08 0%,#000 80%)}
  .outer{position:absolute;inset:18px;border:3px solid #7eff62;border-radius:2px}
  .title{position:absolute;left:60px;top:36px;font-size:30px;letter-spacing:8px;color:#9dff7a}
  .topright{position:absolute;right:60px;top:36px;font-size:18px;letter-spacing:4px;color:#9dff7a;text-align:right}
  .frame{position:absolute;left:80px;right:80px;top:96px;bottom:80px;border:2px solid #7eff62}
  .lrail{position:absolute;left:80px;top:120px;width:200px;font-size:18px;line-height:1.6;color:#9dff7a;letter-spacing:2px;padding:10px}
  .rrail{position:absolute;right:100px;top:120px;width:240px;font-size:18px;line-height:1.6;color:#9dff7a;letter-spacing:2px;padding:10px;text-align:right}
  .bigval{font-size:54px;color:#fff700;letter-spacing:6px;font-weight:bold}
  .scope{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);width:780px;height:580px}
  .ladder{position:absolute;left:80px;right:80px;bottom:96px;height:36px;border-top:2px solid #7eff62;display:flex;align-items:flex-start;justify-content:space-between;padding:6px 14px;color:#9dff7a;font-size:16px;letter-spacing:4px}
  /* CRT noise */
  .noise{position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(255,255,255,0.03) 2px 3px),
               radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.55) 100%)}
  /* sweep arm: rotated cone using gradient mask */
  .sweep{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);width:780px;height:580px;
    background:conic-gradient(from -10deg,rgba(126,255,98,0.0) 0deg,rgba(126,255,98,0.45) 30deg,rgba(126,255,98,0.0) 60deg,transparent 360deg);
    border-radius:50%;mix-blend-mode:screen;-webkit-mask:radial-gradient(circle, #000 99%, transparent 100%);}
</style></head><body>
<div id="stage">
  <div class="outer"></div>
  <div class="title">MOTION&nbsp;TRACKER</div>
  <div class="topright">M41A&nbsp;/&nbsp;ZODIAC&nbsp;BAY<br>RNG&nbsp;060&nbsp;METRES</div>
  <div class="frame"></div>
  <div class="lrail">
    BEARING<br>
    <span class="bigval">036</span><br>
    SPEED<br>
    <span class="bigval">078</span>
  </div>
  <div class="rrail">
    CONTACTS<br>
    <span class="bigval">04</span><br>
    NEAREST<br>
    <span class="bigval">012m</span>
  </div>
  <div class="sweep"></div>
  <svg class="scope" viewBox="0 0 780 580">
    <!-- concentric range rings -->
    <g fill="none" stroke="#3aaa2c" stroke-width="1.4">
      <ellipse cx="390" cy="290" rx="380" ry="280"/>
      <ellipse cx="390" cy="290" rx="300" ry="220"/>
      <ellipse cx="390" cy="290" rx="220" ry="160"/>
      <ellipse cx="390" cy="290" rx="140" ry="100"/>
      <ellipse cx="390" cy="290" rx="60"  ry="44"/>
    </g>
    <!-- radial spokes every 30deg -->
    <g stroke="#2a8a20" stroke-width="1" stroke-dasharray="2 4">
      <line x1="10"  y1="290" x2="770" y2="290"/>
      <line x1="390" y1="10"  x2="390" y2="570"/>
      <line x1="60"  y1="60"  x2="720" y2="520"/>
      <line x1="60"  y1="520" x2="720" y2="60"/>
    </g>
    <!-- detection cone (forward, narrow wedge) -->
    <g fill="rgba(126,255,98,0.10)" stroke="#7eff62" stroke-width="1.6">
      <polygon points="390,290 220,40 560,40"/>
    </g>
    <!-- vehicle marker (centre) -->
    <g fill="#fff700">
      <polygon points="390,278 378,302 402,302"/>
    </g>
    <!-- contacts (blips) -->
    <g>
      <circle cx="320" cy="120" r="9" fill="#fff700"/>
      <circle cx="500" cy="180" r="7" fill="#fff700"/>
      <circle cx="612" cy="318" r="6" fill="#fff700"/>
      <circle cx="246" cy="402" r="6" fill="#9dff7a"/>
    </g>
    <!-- distance labels -->
    <g font-family="Courier New" font-size="14" fill="#9dff7a">
      <text x="396" y="240">10</text>
      <text x="396" y="180">20</text>
      <text x="396" y="100">40</text>
      <text x="396" y="40">60</text>
    </g>
  </svg>
  <div class="ladder">
    <span>00</span><span>10</span><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span>
  </div>
  <div class="noise"></div>
</div>
</body></html>
