name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Uses the project's Gradle wrapper (8.10.2) as the single source of
      # truth for the Gradle version; the action provides dependency caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ktlint
        run: ./gradlew :app:ktlintCheck --stacktrace

      - name: Detekt
        run: ./gradlew :app:detekt --stacktrace

      - name: Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --stacktrace
